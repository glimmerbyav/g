<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mela — Where Local Businesses Gather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,400&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF7F2;
    --card:#FFFFFF;
    --primary:#C76A4A;
    --primary-dark:#B15738;
    --secondary:#93A38C;
    --accent:#D7B267;
    --text:#2D2D2D;
    --text-soft:#6B6560;
    --success:#7FA67A;
    --border:#EDE6DA;
    --shadow: 0 2px 6px rgba(45,45,45,0.05), 0 8px 24px rgba(45,45,45,0.06);
    --shadow-hover: 0 6px 16px rgba(199,106,74,0.12), 0 14px 32px rgba(45,45,45,0.09);
    --radius: 20px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    font-family:'Nunito Sans', sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{font-family:'Nunito Sans', sans-serif; font-weight:800; letter-spacing:-0.01em; margin:0;}
  .script{font-family:'Caveat', cursive;}
  a{text-decoration:none; color:inherit;}
  button{font-family:inherit; cursor:pointer;}
  img{display:block;}
  ::selection{background:var(--accent); color:#2D2D2D;}
  :focus-visible{outline:3px solid var(--accent); outline-offset:2px; border-radius:6px;}

  /* ---------- layout shell ---------- */
  .app{min-height:100vh; display:flex; flex-direction:column;}
  .container{max-width:1180px; margin:0 auto; padding:0 28px;}

  /* ---------- nav ---------- */
  .navbar{
    position:sticky; top:0; z-index:100;
    background:rgba(250,247,242,0.92);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--border);
  }
  .nav-inner{
    max-width:1180px; margin:0 auto; padding:14px 28px;
    display:flex; align-items:center; justify-content:space-between; gap:20px;
  }
  .brand{display:flex; align-items:center; gap:10px; font-size:22px; font-weight:800;}
  .brand-mark{
    width:38px; height:38px; border-radius:12px;
    background:linear-gradient(135deg, var(--primary), var(--accent));
    display:flex; align-items:center; justify-content:center;
    font-size:19px;
  }
  .nav-links{display:flex; align-items:center; gap:4px; flex-wrap:wrap;}
  .nav-link{
    display:flex; align-items:center; gap:7px;
    padding:10px 15px; border-radius:999px; font-weight:700; font-size:14.5px;
    color:var(--text-soft); border:none; background:transparent; transition:all .15s ease;
    white-space:nowrap;
  }
  .nav-link:hover{background:#F1EAE0; color:var(--text);}
  .nav-link.active{background:var(--primary); color:#fff;}
  .nav-right{display:flex; align-items:center; gap:10px;}
  .avatar-btn{
    width:40px; height:40px; border-radius:50%; border:2px solid var(--border);
    background:linear-gradient(135deg,#E8B896,#C76A4A); color:#fff; font-weight:800;
    display:flex; align-items:center; justify-content:center; font-size:15px;
  }
  .mobile-toggle{display:none;}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    padding:14px 26px; border-radius:999px; font-weight:800; font-size:15.5px;
    border:none; transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--primary); color:#fff; box-shadow:0 6px 18px rgba(199,106,74,0.30);}
  .btn-primary:hover{background:var(--primary-dark); box-shadow:0 8px 22px rgba(199,106,74,0.38);}
  .btn-secondary{background:#fff; color:var(--text); border:2px solid var(--border);}
  .btn-secondary:hover{border-color:var(--secondary); background:#F6F3EC;}
  .btn-sm{padding:9px 18px; font-size:13.5px;}
  .btn-block{width:100%;}
  .btn-ghost{background:transparent; color:var(--primary); font-weight:800;}

  /* ---------- sections/views ---------- */
  .view{display:none; animation:fadeIn .35s ease;}
  .view.active{display:block;}
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  section{padding:64px 0;}
  .section-tight{padding:36px 0;}
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px; color:var(--primary); font-weight:800;
    font-size:13px; letter-spacing:.06em; text-transform:uppercase; margin-bottom:14px;
  }
  .eyebrow::before{content:'✦';}
  .section-head{max-width:640px; margin-bottom:34px;}
  .section-head h2{font-size:34px; margin-bottom:10px;}
  .section-head p{color:var(--text-soft); font-size:16.5px; line-height:1.55;}

  /* ---------- hero ---------- */
  .hero{
    position:relative; padding:70px 0 40px; overflow:hidden;
  }
  .hero-grid{display:grid; grid-template-columns:1.05fr .95fr; gap:50px; align-items:center;}
  .hero-badge{
    display:inline-flex; align-items:center; gap:8px; background:#fff; border:1px solid var(--border);
    padding:8px 16px; border-radius:999px; font-size:13.5px; font-weight:700; color:var(--secondary);
    box-shadow:var(--shadow); margin-bottom:22px;
  }
  .hero h1{font-size:52px; line-height:1.08; margin-bottom:20px;}
  .hero h1 .script{color:var(--primary); font-weight:700; font-size:1.15em; display:inline-block; transform:rotate(-2deg);}
  .hero p{font-size:18px; color:var(--text-soft); line-height:1.6; max-width:490px; margin-bottom:30px;}
  .hero-actions{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:34px;}
  .hero-trust{display:flex; gap:26px; flex-wrap:wrap;}
  .hero-trust div{font-size:13.5px; color:var(--text-soft); font-weight:600;}
  .hero-trust b{display:block; font-size:20px; color:var(--text); font-weight:800;}

  .hero-visual{position:relative; height:460px;}
  .stall{
    position:absolute; border-radius:18px; box-shadow:var(--shadow); overflow:hidden;
    border:6px solid #fff;
  }
  .stall img,.stall .ph{width:100%; height:100%; object-fit:cover; display:block;}
  .stall-1{width:280px; height:230px; top:0; right:40px; transform:rotate(3deg); z-index:3;}
  .stall-2{width:220px; height:180px; top:150px; left:0; transform:rotate(-4deg); z-index:2;}
  .stall-3{width:200px; height:170px; bottom:0; right:100px; transform:rotate(-3deg); z-index:1;}
  .float-chip{
    position:absolute; background:#fff; border-radius:16px; padding:12px 16px; box-shadow:var(--shadow-hover);
    display:flex; align-items:center; gap:10px; font-weight:700; font-size:13.5px; z-index:5;
  }
  .chip-1{top:210px; left:210px;}
  .chip-2{bottom:40px; left:60px;}
  .ph{background:linear-gradient(135deg,var(--secondary),var(--accent)); display:flex; align-items:center; justify-content:center; font-size:44px;}
  .ph.terr{background:linear-gradient(135deg,var(--primary),#E3A788);}
  .ph.mustard{background:linear-gradient(135deg,var(--accent),#EFD9A6);}
  .ph.sage{background:linear-gradient(135deg,var(--secondary),#C3D0BC);}

  /* ---------- stat bar ---------- */
  .stats-bar{
    background:#fff; border:1px solid var(--border); border-radius:24px; padding:36px 20px;
    display:grid; grid-template-columns:repeat(3,1fr); text-align:center; box-shadow:var(--shadow);
    margin:20px 0 10px;
  }
  .stats-bar div b{display:block; font-size:36px; color:var(--primary); font-weight:800;}
  .stats-bar div span{color:var(--text-soft); font-weight:700; font-size:14px;}

  /* ---------- cards ---------- */
  .grid{display:grid; gap:26px;}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}

  .card{
    background:var(--card); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow);
    border:1px solid var(--border); transition:transform .2s ease, box-shadow .2s ease; cursor:pointer;
  }
  .card:hover{transform:translateY(-6px); box-shadow:var(--shadow-hover);}
  .card-img{height:170px; position:relative;}
  .badge{
    position:absolute; top:12px; left:12px; background:#fff; padding:5px 12px; border-radius:999px;
    font-size:12px; font-weight:800; color:var(--primary); box-shadow:var(--shadow);
  }
  .badge.tag{
    background:#fff; border:1.5px dashed var(--accent); color:#8A6C2D;
  }
  .fav-btn{
    position:absolute; top:12px; right:12px; width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.92);
    border:none; display:flex; align-items:center; justify-content:center; font-size:16px; box-shadow:var(--shadow);
  }
  .card-body{padding:18px 18px 20px;}
  .card-body h3{font-size:17.5px; margin-bottom:6px;}
  .card-meta{display:flex; align-items:center; gap:6px; color:var(--text-soft); font-size:13.5px; margin-bottom:4px;}
  .card-stats{display:flex; gap:14px; margin:12px 0 14px; flex-wrap:wrap;}
  .card-stats span{font-size:12.5px; color:var(--text-soft); font-weight:700; display:flex; align-items:center; gap:4px;}
  .rating{color:var(--accent); font-weight:800;}
  .card-foot{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .fee-pill{font-weight:800; color:var(--text); font-size:14px;}

  /* ---------- market tag (signature element) ---------- */
  .market-tag{
    position:relative; display:inline-flex; align-items:center; gap:6px;
    background:#FFF8EC; border:1.5px dashed var(--accent); border-radius:10px;
    padding:5px 12px 5px 16px; font-weight:800; font-size:12.5px; color:#8A6C2D;
  }
  .market-tag::before{
    content:''; position:absolute; left:5px; top:50%; width:6px; height:6px; margin-top:-3px;
    border-radius:50%; background:var(--bg); border:1.5px dashed var(--accent);
  }

  /* ---------- filters ---------- */
  .search-hero{background:linear-gradient(180deg,#FFF3E7,var(--bg)); padding:50px 0 20px;}
  .search-bar{
    background:#fff; border-radius:20px; box-shadow:var(--shadow); padding:10px; display:flex; gap:10px;
    border:1px solid var(--border);
  }
  .search-bar input{
    flex:1; border:none; outline:none; padding:14px 18px; font-size:16px; font-family:inherit; background:transparent;
  }
  .filter-row{display:flex; gap:10px; flex-wrap:wrap; margin:20px 0 6px;}
  .filter-chip{
    padding:10px 16px; border-radius:999px; border:2px solid var(--border); background:#fff; font-weight:700; font-size:13.5px;
    color:var(--text-soft); display:flex; align-items:center; gap:6px; transition:all .15s ease;
  }
  .filter-chip:hover{border-color:var(--secondary);}
  .filter-chip.on{background:var(--secondary); color:#fff; border-color:var(--secondary);}
  .results-head{display:flex; align-items:center; justify-content:space-between; margin:30px 0 18px; flex-wrap:wrap; gap:12px;}

  .split{display:grid; grid-template-columns:1.5fr 1fr; gap:26px; align-items:start;}
  .map-preview{
    background:linear-gradient(135deg,#EFEAE0,#E4DDCF); border-radius:20px; height:520px; position:sticky; top:90px;
    border:1px solid var(--border); overflow:hidden; position:relative;
  }

  /* ---------- event detail ---------- */
  .cover{
    height:340px; border-radius:24px; overflow:hidden; position:relative; margin-bottom:-60px;
  }
  .cover .ph{height:100%;}
  .cover-fade{position:absolute; inset:0; background:linear-gradient(180deg,rgba(0,0,0,0) 40%,rgba(0,0,0,.55) 100%);}
  .detail-card{
    background:#fff; border-radius:24px; box-shadow:var(--shadow); padding:30px; margin:0 20px; position:relative; z-index:2;
    border:1px solid var(--border);
  }
  .detail-top{display:flex; justify-content:space-between; align-items:flex-start; gap:20px; flex-wrap:wrap;}
  .organizer-row{display:flex; align-items:center; gap:12px; margin-top:14px;}
  .organizer-row .avatar-btn{width:44px;height:44px;}
  .info-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin:26px 0;}
  .info-box{background:#FBF8F3; border-radius:14px; padding:16px; text-align:center; border:1px solid var(--border);}
  .info-box b{display:block; font-size:19px; margin-bottom:2px;}
  .info-box span{font-size:12px; color:var(--text-soft); font-weight:700;}
  .amenities{display:flex; flex-wrap:wrap; gap:10px; margin:14px 0;}
  .amenity{
    display:flex; align-items:center; gap:6px; background:#F2F7F0; color:#4E6B49; padding:8px 14px; border-radius:999px;
    font-weight:700; font-size:13px;
  }
  .gallery{display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0;}
  .gallery .ph{height:110px; border-radius:12px;}

  .review-card{
    border:1px solid var(--border); border-radius:16px; padding:18px 20px; margin-bottom:14px; background:#FEFDFB;
  }
  .review-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;}
  .review-sub{display:flex; gap:16px; flex-wrap:wrap; margin:10px 0; font-size:12.5px; color:var(--text-soft);}
  .review-sub b{color:var(--text);}
  .stars{color:var(--accent); letter-spacing:2px;}

  /* ---------- community ---------- */
  .post-card{
    background:#fff; border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:18px; box-shadow:var(--shadow);
  }
  .post-head{display:flex; align-items:center; gap:12px; margin-bottom:12px;}
  .post-head .name{font-weight:800; font-size:15px;}
  .post-head .meta{font-size:12.5px; color:var(--text-soft);}
  .post-body{font-size:15px; line-height:1.55; margin-bottom:12px;}
  .post-photo{height:200px; border-radius:14px; margin-bottom:12px;}
  .post-actions{display:flex; gap:6px; border-top:1px solid var(--border); padding-top:10px;}
  .post-action{
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px; padding:8px; border-radius:10px;
    font-weight:700; font-size:13.5px; color:var(--text-soft); background:transparent; border:none;
  }
  .post-action:hover{background:#F6F3EC; color:var(--text);}
  .post-action.liked{color:var(--primary);}
  .side-card{background:#fff; border:1px solid var(--border); border-radius:20px; padding:20px; margin-bottom:20px; box-shadow:var(--shadow);}
  .side-card h4{font-size:15px; margin-bottom:14px;}
  .mini-row{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .mini-row .name{font-weight:700; font-size:13.5px;}
  .mini-row .sub{font-size:11.5px; color:var(--text-soft);}
  .composer{background:#fff; border:1px solid var(--border); border-radius:20px; padding:18px 20px; margin-bottom:20px; box-shadow:var(--shadow);}
  .composer textarea{
    width:100%; border:none; resize:none; font-family:inherit; font-size:15px; outline:none; min-height:50px; background:transparent;
  }

  /* ---------- profile ---------- */
  .profile-cover{height:150px; border-radius:24px 24px 0 0;}
  .profile-header{
    background:#fff; border:1px solid var(--border); border-radius:0 0 24px 24px; padding:0 30px 26px; margin-bottom:26px;
    box-shadow:var(--shadow);
  }
  .profile-logo{
    width:96px; height:96px; border-radius:20px; border:5px solid #fff; margin-top:-48px; box-shadow:var(--shadow);
  }
  .profile-top{display:flex; justify-content:space-between; align-items:flex-end; flex-wrap:wrap; gap:16px;}
  .profile-tags{display:flex; gap:8px; flex-wrap:wrap; margin:10px 0;}
  .stat-strip{display:flex; gap:30px; margin-top:16px; flex-wrap:wrap;}
  .stat-strip div b{font-size:20px; display:block;}
  .stat-strip div span{font-size:12.5px; color:var(--text-soft); font-weight:700;}
  .tabs{display:flex; gap:6px; border-bottom:2px solid var(--border); margin-bottom:24px;}
  .tab{padding:12px 4px; margin-right:22px; font-weight:800; color:var(--text-soft); border-bottom:3px solid transparent; position:relative; top:2px;}
  .tab.active{color:var(--primary); border-color:var(--primary);}

  /* ---------- organizer dashboard ---------- */
  .kpi-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:18px; margin-bottom:30px;}
  .kpi{background:#fff; border:1px solid var(--border); border-radius:18px; padding:20px; box-shadow:var(--shadow);}
  .kpi span{font-size:13px; color:var(--text-soft); font-weight:700;}
  .kpi b{font-size:26px; display:block; margin:6px 0 2px;}
  .kpi .trend{font-size:12.5px; font-weight:800;}
  .trend.up{color:var(--success);}
  .bars{display:flex; align-items:flex-end; gap:10px; height:150px; margin-top:16px;}
  .bar{flex:1; background:linear-gradient(180deg,var(--accent),var(--primary)); border-radius:8px 8px 0 0; position:relative;}
  .bar span{position:absolute; bottom:-22px; left:0; right:0; text-align:center; font-size:11px; color:var(--text-soft); font-weight:700;}
  .table-row{
    display:flex; align-items:center; justify-content:space-between; padding:14px 0; border-bottom:1px solid var(--border); gap:12px;
  }
  .table-row:last-child{border:none;}
  .pill-status{padding:5px 12px; border-radius:999px; font-size:12px; font-weight:800;}
  .pill-status.pending{background:#FFF3D9; color:#8A6C2D;}
  .pill-status.approved{background:#E7F1E5; color:#4E6B49;}
  .pill-status.waitlist{background:#F1EAE0; color:#6B6560;}

  /* ---------- map ---------- */
  .map-wrap{
    background:linear-gradient(135deg,#EFEAE0,#E7E0D2); border-radius:28px; height:560px; position:relative; overflow:hidden;
    border:1px solid var(--border); box-shadow:var(--shadow);
  }
  .map-road{position:absolute; background:#fff; opacity:.5;}
  .pin{
    position:absolute; width:38px; height:38px; border-radius:50% 50% 50% 0; background:var(--primary); transform:rotate(-45deg);
    display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(199,106,74,0.4); border:3px solid #fff;
    transition:transform .15s ease;
  }
  .pin span{transform:rotate(45deg); font-size:14px;}
  .pin:hover{transform:rotate(-45deg) scale(1.15);}
  .pin.cluster{background:var(--secondary); box-shadow:0 4px 10px rgba(147,163,140,0.4);}
  .map-popup{
    position:absolute; width:230px; background:#fff; border-radius:16px; box-shadow:var(--shadow-hover); overflow:hidden; z-index:20;
    border:1px solid var(--border);
  }
  .map-popup .ph{height:100px;}
  .map-popup-body{padding:12px 14px;}

  /* ---------- gather AI ---------- */
  .ai-fab{
    position:fixed; bottom:26px; right:26px; z-index:200; background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff; padding:15px 22px; border-radius:999px; border:none; font-weight:800; font-size:15px; box-shadow:0 10px 26px rgba(199,106,74,.35);
    display:flex; align-items:center; gap:9px;
  }
  .ai-panel{
    position:fixed; bottom:96px; right:26px; width:360px; max-height:70vh; background:#fff; border-radius:22px; box-shadow:var(--shadow-hover);
    z-index:200; display:none; flex-direction:column; overflow:hidden; border:1px solid var(--border);
  }
  .ai-panel.open{display:flex;}
  .ai-head{background:linear-gradient(135deg,var(--primary),#DE8C63); color:#fff; padding:18px 20px;}
  .ai-body{padding:16px 18px; overflow-y:auto;}
  .ai-msg{background:#FBF8F3; border-radius:14px; padding:14px 16px; font-size:14px; line-height:1.5; margin-bottom:12px; border:1px solid var(--border);}
  .ai-rec{border:1px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px;}
  .ai-rec b{font-size:14px;}
  .ai-rec p{font-size:13px; color:var(--text-soft); margin:6px 0 0; line-height:1.5;}

  /* ---------- success stories ---------- */
  .story-card{
    background:#fff; border:1px solid var(--border); border-radius:22px; padding:26px; box-shadow:var(--shadow); position:relative;
  }
  .story-quote{font-size:16.5px; font-style:italic; line-height:1.55; margin:14px 0;}
  .story-foot{display:flex; align-items:center; gap:12px;}

  /* ---------- footer ---------- */
  footer{background:#2D2D2D; color:#EDE6DA; padding:50px 0 26px; margin-top:40px;}
  .foot-grid{display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:30px; margin-bottom:30px;}
  footer h4{color:#fff; font-size:14px; margin-bottom:14px;}
  footer a{display:block; color:#B8B2A8; font-size:14px; margin-bottom:10px;}
  footer a:hover{color:#fff;}
  .foot-bottom{border-top:1px solid #46433f; padding-top:20px; font-size:13px; color:#918C84; display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px;}

  /* ---------- toast ---------- */
  .toast{
    position:fixed; top:90px; left:50%; transform:translateX(-50%) translateY(-20px); background:var(--text); color:#fff;
    padding:12px 22px; border-radius:999px; font-weight:700; font-size:14px; z-index:300; opacity:0; pointer-events:none;
    transition:all .3s ease; box-shadow:var(--shadow-hover);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (max-width:960px){
    .nav-links{display:none;}
    .mobile-toggle{display:block;}
    .hero-grid{grid-template-columns:1fr;}
    .hero-visual{display:none;}
    .grid-3,.grid-2,.split,.info-grid,.kpi-grid,.foot-grid,.stats-bar,.gallery{grid-template-columns:repeat(2,1fr);}
    .info-grid{grid-template-columns:repeat(2,1fr);}
    .ai-panel{width:92vw; right:4vw;}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

/* ============================= HELPERS ============================= */
function stars(n){ const full=Math.round(n); return "★".repeat(full)+"☆".repeat(5-full); }
function ph(color, emoji, extraStyle=""){ return `<div class="ph ${color}" style="${extraStyle}">${emoji}</div>`; }
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(window._toastTimer); window._toastTimer=setTimeout(()=>t.classList.remove('show'), 2200);
}
function go(view, extra){
  state.view = view;
  if(extra && extra.eventId) state.eventId = extra.eventId;
  if(extra && extra.biz) state.biz = extra.biz;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}
window.go = go; window.toast = toast;

/* ============================= SEARCH VIEW ============================= */
const FILTER_OPTIONS = [
  {id:"weekend", label:"🗓️ Weekend"},
  {id:"weekday", label:"📆 Weekday"},
  {id:"indoor", label:"🏠 Indoor"},
  {id:"outdoor", label:"🌤️ Outdoor"},
  {id:"electricity", label:"🔌 Electricity"},
  {id:"family", label:"👨‍👩‍👧 Family Friendly"},
];
function toggleFilter(id){
  if(state.activeFilters.has(id)) state.activeFilters.delete(id); else state.activeFilters.add(id);
  render();
}
function matchesFilters(e){
  for(const f of state.activeFilters){
    if(f==="weekend" && !e.weekend) return false;
    if(f==="weekday" && e.weekend) return false;
    if(f==="indoor" && !e.indoor) return false;
    if(f==="outdoor" && e.indoor) return false;
    if(f==="electricity" && !e.electricity) return false;
    if(f==="family" && !e.family) return false;
  }
  return true;
}
function searchView(){
  const results = EVENTS.filter(matchesFilters);
  return `
  <section class="search-hero">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Find events</div>
        <h2>What kind of market are you looking for?</h2>
        <p>Filter by what matters to your business, no guesswork required.</p>
      </div>
      <div class="search-bar">
        <input placeholder="Try 'weekend farmers market near me'" />
        <button class="btn btn-primary" onclick="toast('Showing best matches below')">Search</button>
      </div>
      <div class="filter-row">
        ${FILTER_OPTIONS.map(f=>`<button class="filter-chip ${state.activeFilters.has(f.id)?'on':''}" onclick="toggleFilter('${f.id}')">${f.label}</button>`).join('')}
      </div>
    </div>
  </section>
  <section class="section-tight">
    <div class="container">
      <div class="split">
        <div>
          <div class="results-head">
            <h3 style="font-size:20px;">${results.length} events match your search</h3>
          </div>
          <div class="grid grid-2">
            ${results.map(eventCard).join('') || `<p style="color:var(--text-soft)">No events match those filters yet. Try removing one.</p>`}
          </div>
        </div>
        <div class="map-preview">
          ${miniMapPins(results)}
        </div>
      </div>
    </div>
  </section>
  `;
}
function miniMapPins(events){
  const positions = [[20,30],[55,20],[35,55],[70,60],[15,70],[80,35]];
  return events.map((e,i)=>{
    const [top,left] = positions[i%positions.length];
    return `<div class="pin" style="top:${top}%; left:${left}%;" onclick="go('event',{eventId:${e.id}})" title="${e.name}"><span>${e.emoji}</span></div>`;
  }).join('');
}

function mapView(){
  const positions = [[18,22],[40,55],[62,15],[70,68],[25,75],[85,42]];
  return `
  <section class="section-tight">
    <div class="container">
      <div class="section-head">
        <div class="eyebrow">Explore</div>
        <h2>Map of Nearby Events</h2>

      </div>
      <div class="map-wrap" id="mapWrap">
        ${EVENTS.map((e,i)=>{
          const [top,left] = positions[i];
          return `<div class="pin" style="top:${top}%; left:${left}%;" onclick="showMapPopup(event,${e.id})"><span>${e.emoji}</span></div>`;
        }).join('')}
        <div class="pin cluster" style="top:50%; left:88%;" onclick="toast('2 more events nearby, zoom in to see them')"><span>+2</span></div>
        <div id="mapPopupHolder"></div>
      </div>
    </div>
  </section>
  `;
}
function showMapPopup(evt, id){
  evt.stopPropagation();
  const e = EVENTS.find(x=>x.id===id);
  const holder = document.getElementById('mapPopupHolder');
  const rect = evt.target.closest('.pin').getBoundingClientRect();
  const wrapRect = document.getElementById('mapWrap').getBoundingClientRect();
  const top = rect.top - wrapRect.top + 40;
  const left = Math.min(rect.left - wrapRect.left, wrapRect.width - 240);
  holder.innerHTML = `
    <div class="map-popup" style="top:${top}px; left:${left}px;">
      <div class="ph ${e.color}" style="height:100px; font-size:32px;">${e.emoji}</div>
      <div class="map-popup-body">
        <div style="font-weight:800; font-size:14.5px; margin-bottom:4px;">${e.name}</div>
        <div style="font-size:12.5px; color:var(--text-soft); margin-bottom:8px;">📅 ${e.date} · 📍 ${e.distance}</div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="rating" style="font-size:13px;">★ ${e.rating}</span>
          <span style="font-weight:800; font-size:13px;">${e.fee}</span>
        </div>
        <button class="btn btn-primary btn-sm btn-block" style="margin-top:10px;" onclick="go('event',{eventId:${e.id}})">View Details</button>
      </div>
    </div>`;
}
